<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .metric-card {
            text-align: center;
            padding: 20px;
        }
        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #007bff;
        }
        .metric-label {
            font-size: 1.1rem;
            color: #6c757d;
        }
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 20px;
        }
        .btn-refresh {
            margin-bottom: 20px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">数据分析看板</h1>
        
        <div class="row mb-4">
            <div class="col-md-12 text-center">
                <button id="refresh-btn" class="btn btn-primary btn-lg btn-refresh">
                    <i class="bi bi-arrow-clockwise"></i> 刷新数据
                </button>
            </div>
        </div>
        
        <!-- 核心指标 -->
        <h2 class="mb-4">核心指标</h2>
        <div class="row mb-5">
            <div class="col-md-3">
                <div class="card metric-card">
                    <div class="metric-value" id="total-posts">0</div>
                    <div class="metric-label">总发帖量</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card">
                    <div class="metric-value" id="total-views">0</div>
                    <div class="metric-label">总浏览量</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card">
                    <div class="metric-value" id="avg-views">0</div>
                    <div class="metric-label">篇均浏览量</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card metric-card">
                    <div class="metric-value" id="negative-ratio">0%</div>
                    <div class="metric-label">消极情绪占比</div>
                </div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="row mb-5">
            <!-- 发帖趋势 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <h3>发帖趋势</h3>
                            <button id="ai-analysis-btn" class="btn btn-info">
                                <i class="bi bi-brain"></i> 智能分析
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="trends-chart"></canvas>
                        </div>
                        <!-- AI分析结果区域 -->
                        <div id="ai-analysis-result" class="mt-4 hidden">
                            <h4>AI分析结果</h4>
                            <div class="alert alert-info" id="ai-analysis-content">
                                <!-- AI分析内容将显示在这里 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 问题类型分布 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>问题类型分布</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="categories-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mb-5">
            <!-- 情感分布 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>情感分布</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="sentiment-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 交叉分析 -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3>问题类型与情感交叉分析</h3>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="cross-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 核心贡献者 -->
        <h2 class="mb-4">核心贡献者</h2>
        <div class="card mb-5">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>作者</th>
                            <th>发帖量</th>
                            <th>累计浏览量</th>
                        </tr>
                    </thead>
                    <tbody id="contributors-table">
                        <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 热度追踪 -->
        <h2 class="mb-4">热度追踪</h2>
        <div class="card mb-5">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>作者</th>
                            <th>发布时间</th>
                            <th>问题类型</th>
                            <th>情感</th>
                            <th>浏览量</th>
                            <th>链接</th>
                        </tr>
                    </thead>
                    <tbody id="hot-posts-table">
                        <!-- 数据将通过JavaScript动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // API基础URL
        const API_BASE = 'http://localhost:8000';
        const AI_API_URL = 'https://power-api.yingdao.com/oapi/power/v1/rest/flow/d3f1235e-9eab-4b17-bd65-6514d4f8b7c7/execute';
        const AI_API_KEY = 'AP_b3D47FdfG2NEDmRN';
        
        // 图表实例
        let trendsChart, categoriesChart, sentimentChart, crossChart;
        
        // 初始化图表
        function initCharts() {
            // 发帖趋势图表
            const trendsCtx = document.getElementById('trends-chart').getContext('2d');
            trendsChart = new Chart(trendsCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '帖子数量',
                            data: [],
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.2)',
                            borderWidth: 2,
                            tension: 0.3
                        },
                        {
                            label: '浏览量',
                            data: [],
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderWidth: 2,
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
            
            // 问题类型分布图表
            const categoriesCtx = document.getElementById('categories-chart').getContext('2d');
            categoriesChart = new Chart(categoriesCtx, {
                type: 'pie',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.8)',
                            'rgba(54, 162, 235, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(153, 102, 255, 0.8)',
                            'rgba(255, 159, 64, 0.8)',
                            'rgba(199, 199, 199, 0.8)',
                            'rgba(83, 102, 255, 0.8)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });
            
            // 情感分布图表
            const sentimentCtx = document.getElementById('sentiment-chart').getContext('2d');
            sentimentChart = new Chart(sentimentCtx, {
                type: 'doughnut',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        backgroundColor: [
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(255, 99, 132, 0.8)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
            
            // 交叉分析图表
            const crossCtx = document.getElementById('cross-chart').getContext('2d');
            crossChart = new Chart(crossCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: '积极',
                            data: [],
                            backgroundColor: 'rgba(75, 192, 192, 0.8)'
                        },
                        {
                            label: '中性',
                            data: [],
                            backgroundColor: 'rgba(255, 206, 86, 0.8)'
                        },
                        {
                            label: '消极',
                            data: [],
                            backgroundColor: 'rgba(255, 99, 132, 0.8)'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
        
        // 获取核心指标
        async function fetchMetrics() {
            try {
                const response = await fetch(`${API_BASE}/api/metrics`);
                const data = await response.json();
                
                document.getElementById('total-posts').textContent = data.total_posts;
                document.getElementById('total-views').textContent = data.total_views;
                document.getElementById('avg-views').textContent = data.avg_views;
                document.getElementById('negative-ratio').textContent = `${data.negative_ratio}%`;
            } catch (error) {
                console.error('获取核心指标失败:', error);
            }
        }
        
        // 获取发帖趋势
        async function fetchTrends() {
            try {
                const response = await fetch(`${API_BASE}/api/trends`);
                const data = await response.json();
                
                const labels = data.map(item => item.date);
                const postCounts = data.map(item => item.post_count);
                const viewCounts = data.map(item => item.view_count);
                
                trendsChart.data.labels = labels;
                trendsChart.data.datasets[0].data = postCounts;
                trendsChart.data.datasets[1].data = viewCounts;
                trendsChart.update();
            } catch (error) {
                console.error('获取发帖趋势失败:', error);
            }
        }
        
        // 获取问题类型分布
        async function fetchCategories() {
            try {
                const response = await fetch(`${API_BASE}/api/categories`);
                const data = await response.json();
                
                const labels = data.map(item => item.category);
                const values = data.map(item => item.count);
                
                categoriesChart.data.labels = labels;
                categoriesChart.data.datasets[0].data = values;
                categoriesChart.update();
            } catch (error) {
                console.error('获取问题类型分布失败:', error);
            }
        }
        
        // 获取情感分布
        async function fetchSentiment() {
            try {
                const response = await fetch(`${API_BASE}/api/sentiment`);
                const data = await response.json();
                
                const labels = data.map(item => item.sentiment);
                const values = data.map(item => item.count);
                
                sentimentChart.data.labels = labels;
                sentimentChart.data.datasets[0].data = values;
                sentimentChart.update();
            } catch (error) {
                console.error('获取情感分布失败:', error);
            }
        }
        
        // 获取交叉分析
        async function fetchCrossAnalysis() {
            try {
                const response = await fetch(`${API_BASE}/api/cross-analysis`);
                const data = await response.json();
                
                const labels = data.map(item => item.category);
                const positive = data.map(item => item.positive);
                const neutral = data.map(item => item.neutral);
                const negative = data.map(item => item.negative);
                
                crossChart.data.labels = labels;
                crossChart.data.datasets[0].data = positive;
                crossChart.data.datasets[1].data = neutral;
                crossChart.data.datasets[2].data = negative;
                crossChart.update();
            } catch (error) {
                console.error('获取交叉分析失败:', error);
            }
        }
        
        // 获取核心贡献者
        async function fetchContributors() {
            try {
                const response = await fetch(`${API_BASE}/api/contributors`);
                const data = await response.json();
                
                const tableBody = document.getElementById('contributors-table');
                tableBody.innerHTML = '';
                
                data.forEach(contributor => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${contributor.author}</td>
                        <td>${contributor.post_count}</td>
                        <td>${contributor.total_views}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('获取核心贡献者失败:', error);
            }
        }
        
        // 获取热度追踪
        async function fetchHotPosts() {
            try {
                const response = await fetch(`${API_BASE}/api/hot-posts`);
                const data = await response.json();
                
                const tableBody = document.getElementById('hot-posts-table');
                tableBody.innerHTML = '';
                
                data.forEach(post => {
                    const row = document.createElement('tr');
                    const link = post.link ? `<a href="${post.link}" target="_blank">链接</a>` : '无';
                    row.innerHTML = `
                        <td>${post.title}</td>
                        <td>${post.author}</td>
                        <td>${post.published_at ? new Date(post.published_at).toLocaleString() : '未知'}</td>
                        <td>${post.category}</td>
                        <td>${post.sentiment}</td>
                        <td>${post.views}</td>
                        <td>${link}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error('获取热度追踪失败:', error);
            }
        }
        
        // 获取AI分析
        async function fetchAiAnalysis() {
            try {
                const btn = document.getElementById('ai-analysis-btn');
                const resultDiv = document.getElementById('ai-analysis-result');
                const contentDiv = document.getElementById('ai-analysis-content');
                
                // 显示加载状态
                btn.innerHTML = '<i class="bi bi-hourglass"></i> 分析中...';
                btn.disabled = true;
                resultDiv.classList.remove('hidden');
                contentDiv.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"><span class="sr-only">Loading...</span></div></div>';
                
                // 直接调用AI API
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${AI_API_KEY}`
                    },
                    body: JSON.stringify({ input: {} })
                });
                
                const data = await response.json();
                
                // 显示分析结果
                if (data.error) {
                    contentDiv.innerHTML = `<div class="alert alert-danger">分析失败: ${data.error}</div>`;
                } else {
                    // 处理AI响应，生成文字分析
                    let analysisText = '';
                    
                    if (data.data && data.data.result && data.data.result.output_text_0) {
                        // 解析CSV格式的分析结果
                        const csvData = data.data.result.output_text_0;
                        const lines = csvData.split('\n');
                        if (lines.length > 1) {
                            // 提取标题行
                            const headers = lines[0].split(',');
                            // 提取数据行
                            const dataRows = lines.slice(1).filter(line => line.trim() !== '');
                            
                            if (dataRows.length > 0) {
                                // 解析数据
                                const postsData = dataRows.map(row => {
                                    const values = row.split(',');
                                    return {
                                        date: values[0],
                                        postCount: parseInt(values[1]),
                                        totalViews: parseInt(values[2])
                                    };
                                });
                                
                                // 生成分析文字
                                analysisText = generateAnalysisText(postsData);
                            }
                        }
                    } else if (data.msg) {
                        analysisText = `<p>${data.msg}</p>`;
                    } else if (data.success === false) {
                        analysisText = `<div class="alert alert-warning">分析失败: ${data.msg || '未知错误'}</div>`;
                    } else {
                        analysisText = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                    }
                    
                    contentDiv.innerHTML = analysisText;
                }
            } catch (error) {
                console.error('获取AI分析失败:', error);
                document.getElementById('ai-analysis-content').innerHTML = `<div class="alert alert-danger">分析失败: ${error.message}</div>`;
            } finally {
                // 恢复按钮状态
                const btn = document.getElementById('ai-analysis-btn');
                btn.innerHTML = '<i class="bi bi-brain"></i> 智能分析';
                btn.disabled = false;
            }
        }
        
        // 刷新所有数据
        async function refreshAllData() {
            // 显示加载状态
            document.getElementById('refresh-btn').innerHTML = '<i class="bi bi-hourglass"></i> 加载中...';
            document.getElementById('refresh-btn').disabled = true;
            
            try {
                await Promise.all([
                    fetchMetrics(),
                    fetchTrends(),
                    fetchCategories(),
                    fetchSentiment(),
                    fetchCrossAnalysis(),
                    fetchContributors(),
                    fetchHotPosts()
                ]);
            } finally {
                // 恢复按钮状态
                document.getElementById('refresh-btn').innerHTML = '<i class="bi bi-arrow-clockwise"></i> 刷新数据';
                document.getElementById('refresh-btn').disabled = false;
            }
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            refreshAllData();
            
            // 绑定刷新按钮事件
            document.getElementById('refresh-btn').addEventListener('click', refreshAllData);
            
            // 绑定AI分析按钮事件
            document.getElementById('ai-analysis-btn').addEventListener('click', fetchAiAnalysis);
        });
        
        // 生成分析文字
        function generateAnalysisText(postsData) {
            if (!postsData || postsData.length === 0) {
                return '<p>暂无分析数据</p>';
            }
            
            // 计算总数据
            const totalPosts = postsData.reduce((sum, item) => sum + item.postCount, 0);
            const totalViews = postsData.reduce((sum, item) => sum + item.totalViews, 0);
            const avgViewsPerPost = totalViews / totalPosts;
            
            // 排序数据
            postsData.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // 找出最高和最低的日期
            const highestPostDay = postsData.reduce((max, item) => item.postCount > max.postCount ? item : max);
            const highestViewDay = postsData.reduce((max, item) => item.totalViews > max.totalViews ? item : max);
            
            // 计算增长率
            let growthRate = 0;
            if (postsData.length > 1) {
                const firstDay = postsData[0];
                const lastDay = postsData[postsData.length - 1];
                growthRate = ((lastDay.postCount - firstDay.postCount) / firstDay.postCount) * 100;
            }
            
            // 生成分析文字
            let analysis = `
            <div class="analysis-content">
                <h5>📊 发帖趋势分析</h5>
                <p><strong>整体概况：</strong>过去 ${postsData.length} 天共发布 ${totalPosts} 个帖子，获得 ${totalViews.toLocaleString()} 次浏览，平均每篇帖子获得 ${avgViewsPerPost.toFixed(1)} 次浏览。</p>
                
                <p><strong>每日数据：</strong></p>
                <ul>
            `;
            
            // 添加每日数据
            postsData.forEach(item => {
                const avgViews = (item.totalViews / item.postCount).toFixed(1);
                analysis += `
                    <li><strong>${item.date}：</strong>发布 ${item.postCount} 个帖子，获得 ${item.totalViews} 次浏览，平均每帖 ${avgViews} 次浏览</li>
                `;
            });
            
            analysis += `
                </ul>
                <p><strong>关键洞察：</strong></p>
                <ul>
                    <li>发帖量最高的日期是 ${highestPostDay.date}，共发布 ${highestPostDay.postCount} 个帖子</li>
                    <li>浏览量最高的日期是 ${highestViewDay.date}，共获得 ${highestViewDay.totalViews} 次浏览</li>
            `;
            
            if (growthRate > 0) {
                analysis += `
                    <li>发帖量呈现上升趋势，增长率为 ${growthRate.toFixed(1)}%</li>
                `;
            } else if (growthRate < 0) {
                analysis += `
                    <li>发帖量呈现下降趋势，下降率为 ${Math.abs(growthRate).toFixed(1)}%</li>
                `;
            } else {
                analysis += `
                    <li>发帖量保持稳定</li>
                `;
            }
            
            // 生成建议
            let suggestions = [];
            if (highestPostDay.postCount > totalPosts / postsData.length * 1.5) {
                suggestions.push('建议分析高发帖量日期的原因，复制成功经验');
            }
            
            if (avgViewsPerPost < 50) {
                suggestions.push('建议优化帖子质量，提高浏览量');
            }
            
            if (suggestions.length > 0) {
                analysis += `
                <p><strong>建议：</strong></p>
                <ul>
                `;
                suggestions.forEach(suggestion => {
                    analysis += `
                    <li>${suggestion}</li>
                    `;
                });
                analysis += `
                </ul>
                `;
            }
            
            analysis += `
            </div>
            `;
            
            return analysis;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
