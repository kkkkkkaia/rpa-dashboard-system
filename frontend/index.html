<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPA数据看板</title>
    <!-- 引入CDN库 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/ant-design-vue@4.0.0/dist/reset.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/ant-design-vue@4.0.0/dist/antd.min.js"></script>
    <style>
      .app-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
      }
      .filter-container {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
      }
      .chart-container {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
      }
      .chart-item {
        flex: 1;
        background: #f5f5f5;
        padding: 20px;
        border-radius: 8px;
      }
      .chart {
        height: 300px;
      }
      .table-container {
        margin-bottom: 30px;
      }
      .ai-container {
        background: #e6f7ff;
        padding: 20px;
        border-radius: 8px;
        margin-top: 20px;
      }
      .ai-content {
        margin-top: 10px;
        line-height: 1.6;
      }
      select, button {
        padding: 8px 16px;
        margin-right: 10px;
        border-radius: 4px;
        border: 1px solid #d9d9d9;
      }
      button {
        background: #1890ff;
        color: white;
        border: none;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px;
        border: 1px solid #d9d9d9;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-container">
        <h1>RPA数据看板</h1>
        
        <!-- 筛选器 -->
        <div class="filter-container">
          <select v-model="selectedCategory">
            <option value="">全部分类</option>
            <option v-for="category in categories" :key="category" :value="category">
              {{ category }}
            </option>
          </select>
          <button @click="fetchData">刷新数据</button>
          <button @click="analyzeData">AI分析</button>
        </div>
        
        <!-- 图表区域 -->
        <div class="chart-container">
          <div class="chart-item">
            <h3>数据趋势</h3>
            <div ref="trendChart" class="chart"></div>
          </div>
          <div class="chart-item">
            <h3>分类占比</h3>
            <div ref="pieChart" class="chart"></div>
          </div>
        </div>
        
        <!-- 数据表格 -->
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>名称</th>
                <th>值</th>
                <th>分类</th>
                <th>时间戳</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="item in tableData" :key="item.id">
                <td>{{ item.id }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.value }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.timestamp }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <!-- AI分析结果 -->
        <div v-if="aiAnalysis" class="ai-container">
          <h3>AI智能分析</h3>
          <div class="ai-content">{{ aiAnalysis }}</div>
        </div>
      </div>
    </div>
    
    <script>
      const { createApp } = Vue
      
      createApp({
        data() {
          return {
            selectedCategory: '',
            categories: [],
            data: [],
            tableData: [],
            trendChart: null,
            pieChart: null,
            aiAnalysis: ''
          }
        },
        mounted() {
          this.fetchData()
        },
        methods: {
          async fetchData() {
            try {
              const response = await axios.get('http://localhost:8080/api/data')
              this.data = response.data
              this.updateCategories()
              this.updateTableData()
              this.renderCharts()
            } catch (error) {
              console.error('获取数据失败:', error)
            }
          },
          updateCategories() {
            const categorySet = new Set(this.data.map(item => item.category))
            this.categories = Array.from(categorySet)
          },
          updateTableData() {
            this.tableData = this.selectedCategory
              ? this.data.filter(item => item.category === this.selectedCategory)
              : this.data
          },
          renderCharts() {
            this.renderTrendChart()
            this.renderPieChart()
          },
          renderTrendChart() {
            if (!this.trendChart) {
              this.trendChart = echarts.init(this.$refs.trendChart)
            }
            
            const filteredData = this.selectedCategory
              ? this.data.filter(item => item.category === this.selectedCategory)
              : this.data
            
            const sortedData = filteredData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
            
            const option = {
              xAxis: {
                type: 'category',
                data: sortedData.map(item => item.timestamp)
              },
              yAxis: {
                type: 'value'
              },
              series: [{
                data: sortedData.map(item => item.value),
                type: 'line',
                smooth: true
              }]
            }
            
            this.trendChart.setOption(option)
          },
          renderPieChart() {
            if (!this.pieChart) {
              this.pieChart = echarts.init(this.$refs.pieChart)
            }
            
            const categoryData = {}
            this.data.forEach(item => {
              if (categoryData[item.category]) {
                categoryData[item.category] += item.value
              } else {
                categoryData[item.category] = item.value
              }
            })
            
            const option = {
              series: [{
                type: 'pie',
                radius: '60%',
                data: Object.entries(categoryData).map(([name, value]) => ({ name, value }))
              }]
            }
            
            this.pieChart.setOption(option)
          },
          async analyzeData() {
            try {
              const response = await axios.post('http://localhost:8080/api/analyze', { data: this.data })
              const analysis = response.data
              this.aiAnalysis = `
                分析摘要：${analysis.summary}\n\n
                关键洞察：\n                ${analysis.insights.map(insight => `- ${insight}`).join('\n')}\n\n
                建议：\n                ${analysis.recommendations.map(rec => `- ${rec}`).join('\n')}
              `
            } catch (error) {
              console.error('AI分析失败:', error)
              this.aiAnalysis = 'AI分析失败，请稍后重试'
            }
          }
        },
        watch: {
          selectedCategory() {
            this.updateTableData()
            this.renderCharts()
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
